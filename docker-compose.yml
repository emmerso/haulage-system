

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: haulage_db
      POSTGRES_USER: haulage_user
      POSTGRES_PASSWORD: haulage_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  web:
    build: .
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      - DEBUG=1
      - DATABASE_URL=postgresql://haulage_user:haulage_pass@db:5432/haulage_db

volumes:
  postgres_data: